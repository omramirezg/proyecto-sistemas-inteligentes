# ================================================================
# CIRCUITO DE VAPOR — DIAGRAMA LÓGICO
# ================================================================
circuito_vapor:
  descripcion: |
    La caldera genera vapor saturado a 150 PSI. El vapor viaja por el cabezal
    principal (4") hasta un manifold que distribuye a las 4 peletizadoras.
    Cada línea tiene: válvula de aislamiento manual → regulador de presión
    (baja a 8-12 PSI) → válvula de control proporcional (Fisher V150) →
    acondicionador. La purga del acondicionador tiene trampa de vapor TD42.

  puntos_criticos:
    - nombre: "Cabezal principal"
      riesgo: "Si la caldera baja presión, todas las máquinas pierden vapor simultáneamente"
      indicador: "Presión baja en todas las máquinas al mismo tiempo"

    - nombre: "Regulador Spirax 25P"
      riesgo: "Si se descalibra, la presión al acondicionador oscila o se mantiene baja"
      indicador: "Presión inestable (oscila ±2 PSI en minutos) o permanece por debajo de setpoint"
      accion: "Verificar manómetro local antes y después del regulador. Si hay diferencial >3 PSI, el regulador está fallando"

    - nombre: "Válvula Fisher V150"
      riesgo: "Si el actuador neumático pierde aire, la válvula se cierra (fail-close)"
      indicador: "Caída súbita de presión y temperatura sin cambio en caldera"
      accion: "Verificar presión de aire instrumentos (debe estar >60 PSI). Revisar posicionador de válvula"

    - nombre: "Trampa de vapor TD42"
      riesgo: "Si se bloquea, condensado se acumula en el acondicionador. Reduce transferencia de calor"
      indicador: "Temperatura baja PERO presión normal — el vapor entra pero no transfiere energía"
      accion: "Verificar descarga de la trampa. Si no hay goteo en la mirilla, la trampa está bloqueada"

    - nombre: "Línea de condensado"
      riesgo: "Si la línea de retorno está obstruida, genera contrapresión y reduce flujo de vapor"
      indicador: "Presión normal en entrada pero temperatura sube muy lento"
      accion: "Revisar bomba de condensado y tanque de flasheo"

# ================================================================
# FALLAS COMUNES Y DIAGNÓSTICO DIFERENCIAL
# ================================================================
fallas_comunes:

  - id: "F001"
    nombre: "Caída de presión de vapor — origen caldera"
    sintomas:
      - "Presión baja en TODAS las máquinas simultáneamente"
      - "Temperatura baja progresiva en todos los acondicionadores"
    causa_raiz: "La caldera perdió presión (bajo nivel de agua, falla de quemador, demanda excesiva)"
    verificacion: "Revisar manómetro del cabezal principal. Si está por debajo de 100 PSI, el problema es la caldera"
    accion_operario: "Reducir alimentación en todas las líneas al 50%. No apagar máquinas. Esperar respuesta de caldera"
    accion_mantenimiento: "Verificar nivel de agua, estado del quemador, y si hay purga excesiva"
    tiempo_resolucion_tipico: "15-30 minutos si es quemador, 2+ horas si es nivel de agua"

  - id: "F002"
    nombre: "Caída de presión de vapor — origen regulador"
    sintomas:
      - "Presión baja en UNA sola máquina (las demás están normales)"
      - "Manómetro local antes del regulador muestra presión correcta (>100 PSI)"
      - "Manómetro después del regulador muestra <6 PSI"
    causa_raiz: "Regulador Spirax 25P descalibrado o membrana dañada"
    verificacion: "Comparar lectura antes y después del regulador en el manómetro local"
    accion_operario: "Usar bypass manual (si existe) para mantener producción. Reportar a mantenimiento"
    accion_mantenimiento: "Recalibrar o reemplazar el regulador. Verificar membrana y resorte"
    tiempo_resolucion_tipico: "30-60 minutos"

  - id: "F003"
    nombre: "Pérdida de energía térmica con presión normal"
    sintomas:
      - "Presión de vapor NORMAL (8-12 PSI)"
      - "Temperatura del acondicionador BAJA y no sube"
      - "Producto sale con humedad insuficiente"
    causa_raiz: "Trampa de vapor bloqueada o línea de condensado obstruida"
    verificacion: "Ir a la trampa de vapor TD42 del acondicionador. Verificar si hay descarga visible en la mirilla"
    accion_operario: "Si la trampa no descarga: purgar manualmente por la válvula de drenaje inferior. Si persiste, reducir carga al 60%"
    accion_mantenimiento: "Reemplazar internos de la trampa TD42 o limpiar línea de condensado"
    tiempo_resolucion_tipico: "20-45 minutos"
    nota: "Esta es la falla MÁS CONFUSA porque la presión está bien pero la temperatura no sube. Los operarios suelen pedir más vapor, lo cual NO soluciona el problema"

  - id: "F004"
    nombre: "Sobrepresión en acondicionador"
    sintomas:
      - "Presión por encima de 15 PSI en el acondicionador"
      - "Válvula de seguridad puede actuar (venteo audible)"
    causa_raiz: "Válvula Fisher V150 abierta excesivamente o regulador con setpoint alto"
    verificacion: "Verificar señal de control (4-20mA) al posicionador de la Fisher. Si es >16mA con presión alta, el control está pidiendo demasiado vapor"
    accion_operario: "Cerrar parcialmente la válvula manual de aislamiento. NO intentar ajustar la Fisher manualmente"
    accion_mantenimiento: "Recalibrar lazo de control PLC-Fisher. Verificar setpoint del regulador"
    tiempo_resolucion_tipico: "15-30 minutos"

  - id: "F005"
    nombre: "Sobrecarga del motor principal"
    sintomas:
      - "Corriente por encima del 90% de la nominal"
      - "Temperatura del motor elevada"
      - "Vibración perceptible o ruido inusual"
    causa_raiz: "Exceso de alimentación, dado obstruido, rodillos desajustados, o materia prima con alta dureza"
    verificacion: "Verificar amperímetro del variador. Si corriente >450A en máquina 301, hay sobrecarga"
    accion_operario: "Reducir alimentación inmediatamente al 50%. Si corriente no baja en 2 minutos, parar alimentación completamente"
    accion_mantenimiento: "Inspeccionar dado (buscar agujeros taponados), verificar gap de rodillos, revisar temperatura de cojinetes"
    tiempo_resolucion_tipico: "Variable — si es alimentación: 5 min. Si es dado taponado: 2-4 horas"

  - id: "F006"
    nombre: "Oscilación de presión de vapor"
    sintomas:
      - "Presión oscila ±2-3 PSI cada 30-60 segundos"
      - "Temperatura oscila correspondientemente"
    causa_raiz: "Lazo de control PLC-Fisher inestable (ganancia PID excesiva) o regulador con respuesta lenta"
    verificacion: "Observar la válvula Fisher: si está oscilando visiblemente (abre-cierra rápido), es el PID. Si está quieta, es el regulador"
    accion_operario: "Pasar válvula Fisher a modo manual al 50% de apertura. Esto estabiliza mientras mantenimiento ajusta el PID"
    accion_mantenimiento: "Ajustar parámetros PID del lazo de presión. Reducir ganancia proporcional"
    tiempo_resolucion_tipico: "15-30 minutos en modo manual, 1-2 horas para ajuste PID definitivo"

  - id: "F007"
    nombre: "Producto con baja durabilidad"
    sintomas:
      - "Durabilidad real < objetivo (ej: <92% cuando se pide 96%)"
      - "Variables de proceso aparentemente normales"
    causa_raiz: "Tiempo de acondicionamiento insuficiente, ángulo de paletas incorrecto, o PQF bajo"
    verificacion: "Verificar tiempo de retención en acondicionador (debe ser >25s). Verificar ángulo de paletas"
    accion_operario: "Cerrar ángulo de paletas 5° para aumentar tiempo de retención. Si persiste, reducir velocidad de alimentación 10%"
    accion_mantenimiento: "Verificar desgaste de paletas del acondicionador. Medir PQF de la materia prima"
    tiempo_resolucion_tipico: "Inmediato si es ángulo de paletas"

  - id: "F008"
    nombre: "Falla de sensor de temperatura PT100"
    sintomas:
      - "Temperatura muestra lectura fija (no cambia) o muestra -999/NaN"
      - "Presión de vapor normal"
      - "Producto sale con humedad y temperatura correctas al tacto"
    causa_raiz: "Sensor PT100 desconectado, cable roto, o transmisor dañado"
    verificacion: "Comparar lectura del sistema con medición manual (termómetro portátil en la salida del acondicionador)"
    accion_operario: "Operar con monitoreo manual de temperatura cada 10 minutos. NO confiar en la lectura del sensor"
    accion_mantenimiento: "Revisar conexión del PT100, verificar resistencia del sensor (100Ω a 0°C), reemplazar si necesario"
    tiempo_resolucion_tipico: "30-60 minutos para diagnóstico, inmediato si es conexión suelta"

# ================================================================
# PROCEDIMIENTOS OPERATIVOS ESTÁNDAR (SOPs)
# ================================================================
procedimientos:

  arranque_maquina:
    nombre: "SOP-001: Arranque de peletizadora"
    pasos:
      - "1. Verificar que la caldera tenga presión >120 PSI en cabezal"
      - "2. Abrir válvula manual de aislamiento de vapor"
      - "3. Esperar 5 minutos para que el acondicionador se precaliente (temp >50°C)"
      - "4. Arrancar motor principal en vacío (verificar corriente <35A)"
      - "5. Iniciar alimentación al 30% de capacidad"
      - "6. Ajustar vapor hasta alcanzar temperatura objetivo de fórmula"
      - "7. Incrementar alimentación gradualmente (10% cada 3 minutos)"
      - "8. Verificar durabilidad y humedad del primer lote"

  parada_normal:
    nombre: "SOP-002: Parada normal de peletizadora"
    pasos:
      - "1. Reducir alimentación gradualmente (10% cada 2 minutos)"
      - "2. Cuando alimentación llegue a 0%, cerrar vapor (Fisher al 0%)"
      - "3. Dejar motor corriendo 5 minutos para limpiar dado"
      - "4. Apagar motor principal"
      - "5. Cerrar válvula manual de aislamiento de vapor"

  emergencia_sobrecarga:
    nombre: "SOP-003: Emergencia por sobrecarga de motor"
    pasos:
      - "1. PARAR alimentación inmediatamente (botón rojo del alimentador)"
      - "2. NO apagar el motor principal — dejarlo girar para evitar atoramiento"
      - "3. Cerrar vapor al 50%"
      - "4. Esperar a que corriente baje a <100A (vacío)"
      - "5. Si corriente NO baja en 3 minutos: PARAR motor (riesgo de atoramiento)"
      - "6. Notificar supervisor inmediatamente"
      - "7. NO reiniciar sin inspección de dado y rodillos"

  emergencia_presion_baja:
    nombre: "SOP-004: Emergencia por caída de presión de vapor"
    pasos:
      - "1. Verificar si afecta todas las máquinas o solo una"
      - "2. Si afecta TODAS: problema de caldera — reducir carga al 50% en todas las líneas"
      - "3. Si afecta UNA: problema local — verificar regulador y válvula de esa línea"
      - "4. Revisar manómetros locales (antes y después del regulador)"
      - "5. Si regulador falló: activar bypass manual si existe"
      - "6. Notificar a supervisor y mantenimiento"

