# ================================================================
# CIRCUITO DE VAPOR — DIAGRAMA LÓGICO
# ================================================================
circuito_vapor:
  descripcion: |
    La caldera genera vapor saturado a 150 PSI. El vapor viaja por el cabezal
    principal (4") hasta un manifold que distribuye a las 4 peletizadoras.
    Cada línea tiene: válvula de aislamiento manual → regulador de presión
    (baja a 8-12 PSI) → válvula de control proporcional (Fisher V150) →
    acondicionador. La purga del acondicionador tiene trampa de vapor TD42.

  puntos_criticos:
    - nombre: "Cabezal principal"
      riesgo: "Si la caldera baja presión, todas las máquinas pierden vapor simultáneamente"
      indicador: "Presión baja en todas las máquinas al mismo tiempo"

    - nombre: "Regulador Spirax 25P"
      riesgo: "Si se descalibra, la presión al acondicionador oscila o se mantiene baja"
      indicador: "Presión inestable (oscila ±2 PSI en minutos) o permanece por debajo de setpoint"
      accion: "Verificar manómetro local antes y después del regulador. Si hay diferencial >3 PSI, el regulador está fallando"

    - nombre: "Válvula Fisher V150"
      riesgo: "Si el actuador neumático pierde aire, la válvula se cierra (fail-close)"
      indicador: "Caída súbita de presión y temperatura sin cambio en caldera"
      accion: "Verificar presión de aire instrumentos (debe estar >60 PSI). Revisar posicionador de válvula"

    - nombre: "Trampa de vapor TD42"
      riesgo: "Si se bloquea, condensado se acumula en el acondicionador. Reduce transferencia de calor"
      indicador: "Temperatura baja PERO presión normal — el vapor entra pero no transfiere energía"
      accion: "Verificar descarga de la trampa. Si no hay goteo en la mirilla, la trampa está bloqueada"

    - nombre: "Línea de condensado"
      riesgo: "Si la línea de retorno está obstruida, genera contrapresión y reduce flujo de vapor"
      indicador: "Presión normal en entrada pero temperatura sube muy lento"
      accion: "Revisar bomba de condensado y tanque de flasheo"

# ================================================================
# FALLAS COMUNES Y DIAGNÓSTICO DIFERENCIAL
# ================================================================
fallas_comunes:

  - id: "F001"
    nombre: "Caída de presión de vapor — origen caldera"
    sintomas:
      - "Presión baja en TODAS las máquinas simultáneamente"
      - "Temperatura baja progresiva en todos los acondicionadores"
    causa_raiz: "La caldera perdió presión (bajo nivel de agua, falla de quemador, demanda excesiva)"
    verificacion: "Revisar manómetro del cabezal principal. Si está por debajo de 100 PSI, el problema es la caldera"
    accion_operario: "Reducir alimentación en todas las líneas al 50%. No apagar máquinas. Esperar respuesta de caldera"
    accion_mantenimiento: "Verificar nivel de agua, estado del quemador, y si hay purga excesiva"
    tiempo_resolucion_tipico: "15-30 minutos si es quemador, 2+ horas si es nivel de agua"

  - id: "F002"
    nombre: "Caída de presión de vapor — origen regulador"
    sintomas:
      - "Presión baja en UNA sola máquina (las demás están normales)"
      - "Manómetro local antes del regulador muestra presión correcta (>100 PSI)"
      - "Manómetro después del regulador muestra <6 PSI"
    causa_raiz: "Regulador Spirax 25P descalibrado o membrana dañada"
    verificacion: "Comparar lectura antes y después del regulador en el manómetro local"
    accion_operario: "Usar bypass manual (si existe) para mantener producción. Reportar a mantenimiento"
    accion_mantenimiento: "Recalibrar o reemplazar el regulador. Verificar membrana y resorte"
    tiempo_resolucion_tipico: "30-60 minutos"

  - id: "F003"
    nombre: "Pérdida de energía térmica con presión normal"
    sintomas:
      - "Presión de vapor NORMAL (8-12 PSI)"
      - "Temperatura del acondicionador BAJA y no sube"
      - "Producto sale con humedad insuficiente"
    causa_raiz: "Trampa de vapor bloqueada o línea de condensado obstruida"
    verificacion: "Ir a la trampa de vapor TD42 del acondicionador. Verificar si hay descarga visible en la mirilla"
    accion_operario: "Si la trampa no descarga: purgar manualmente por la válvula de drenaje inferior. Si persiste, reducir carga al 60%"
    accion_mantenimiento: "Reemplazar internos de la trampa TD42 o limpiar línea de condensado"
    tiempo_resolucion_tipico: "20-45 minutos"
    nota: "Esta es la falla MÁS CONFUSA porque la presión está bien pero la temperatura no sube. Los operarios suelen pedir más vapor, lo cual NO soluciona el problema"

  - id: "F004"
    nombre: "Sobrepresión en acondicionador"
    sintomas:
      - "Presión por encima de 15 PSI en el acondicionador"
      - "Válvula de seguridad puede actuar (venteo audible)"
    causa_raiz: "Válvula Fisher V150 abierta excesivamente o regulador con setpoint alto"
    verificacion: "Verificar señal de control (4-20mA) al posicionador de la Fisher. Si es >16mA con presión alta, el control está pidiendo demasiado vapor"
    accion_operario: "Cerrar parcialmente la válvula manual de aislamiento. NO intentar ajustar la Fisher manualmente"
    accion_mantenimiento: "Recalibrar lazo de control PLC-Fisher. Verificar setpoint del regulador"
    tiempo_resolucion_tipico: "15-30 minutos"

  - id: "F005"
    nombre: "Sobrecarga del motor principal"
    sintomas:
      - "Corriente por encima del 90% de la nominal"
      - "Temperatura del motor elevada"
      - "Vibración perceptible o ruido inusual"
    causa_raiz: "Exceso de alimentación, dado obstruido, rodillos desajustados, o materia prima con alta dureza"
    verificacion: "Verificar amperímetro del variador. Si corriente >450A en máquina 301, hay sobrecarga"
    accion_operario: "Reducir alimentación inmediatamente al 50%. Si corriente no baja en 2 minutos, parar alimentación completamente"
    accion_mantenimiento: "Inspeccionar dado (buscar agujeros taponados), verificar gap de rodillos, revisar temperatura de cojinetes"
    tiempo_resolucion_tipico: "Variable — si es alimentación: 5 min. Si es dado taponado: 2-4 horas"

  - id: "F006"
    nombre: "Oscilación de presión de vapor"
    sintomas:
      - "Presión oscila ±2-3 PSI cada 30-60 segundos"
      - "Temperatura oscila correspondientemente"
    causa_raiz: "Lazo de control PLC-Fisher inestable (ganancia PID excesiva) o regulador con respuesta lenta"
    verificacion: "Observar la válvula Fisher: si está oscilando visiblemente (abre-cierra rápido), es el PID. Si está quieta, es el regulador"
    accion_operario: "Pasar válvula Fisher a modo manual al 50% de apertura. Esto estabiliza mientras mantenimiento ajusta el PID"
    accion_mantenimiento: "Ajustar parámetros PID del lazo de presión. Reducir ganancia proporcional"
    tiempo_resolucion_tipico: "15-30 minutos en modo manual, 1-2 horas para ajuste PID definitivo"

  - id: "F007"
    nombre: "Producto con baja durabilidad"
    sintomas:
      - "Durabilidad real < objetivo (ej: <92% cuando se pide 96%)"
      - "Variables de proceso aparentemente normales"
    causa_raiz: "Tiempo de acondicionamiento insuficiente, ángulo de paletas incorrecto, o PQF bajo"
    verificacion: "Verificar tiempo de retención en acondicionador (debe ser >25s). Verificar ángulo de paletas"
    accion_operario: "Cerrar ángulo de paletas 5° para aumentar tiempo de retención. Si persiste, reducir velocidad de alimentación 10%"
    accion_mantenimiento: "Verificar desgaste de paletas del acondicionador. Medir PQF de la materia prima"
    tiempo_resolucion_tipico: "Inmediato si es ángulo de paletas"

  - id: "F008"
    nombre: "Falla de sensor de temperatura PT100"
    sintomas:
      - "Temperatura muestra lectura fija (no cambia) o muestra -999/NaN"
      - "Presión de vapor normal"
      - "Producto sale con humedad y temperatura correctas al tacto"
    causa_raiz: "Sensor PT100 desconectado, cable roto, o transmisor dañado"
    verificacion: "Comparar lectura del sistema con medición manual (termómetro portátil en la salida del acondicionador)"
    accion_operario: "Operar con monitoreo manual de temperatura cada 10 minutos. NO confiar en la lectura del sensor"
    accion_mantenimiento: "Revisar conexión del PT100, verificar resistencia del sensor (100Ω a 0°C), reemplazar si necesario"
    tiempo_resolucion_tipico: "30-60 minutos para diagnóstico, inmediato si es conexión suelta"

  - id: "F009"
    nombre: "Atoramiento del dado (die plugging)"
    sintomas:
      - "Corriente del motor sube rápido a >95% y se mantiene"
      - "Vibración excesiva y ruido metálico agudo"
      - "Producción de pellet se detiene aunque el alimentador sigue operando"
      - "Temperatura del dado sube anormalmente"
    causa_raiz: "Materia prima con alto contenido de grasa o humedad excesiva que plastifica y sella los agujeros del dado. También ocurre si los rodillos están demasiado cerca del dado (gap <0.5mm)"
    verificacion: "Detener alimentación y observar si la corriente baja a vacío (<35A). Si no baja, el dado está completamente taponado"
    accion_operario: "1. PARAR alimentación inmediatamente. 2. NO apagar motor — dejarlo girar. 3. Si corriente baja a vacío en 2 min, reiniciar alimentación al 20%. 4. Si NO baja, parar motor y llamar mantenimiento"
    accion_mantenimiento: "Retirar dado, limpiar con aire comprimido o taladrar agujeros taponados. Verificar gap de rodillos (debe ser 0.8-1.2mm). Verificar estado de la superficie interna del dado"
    tiempo_resolucion_tipico: "Si parcial: 30 min. Si completo: 2-6 horas (requiere extraer dado)"
    nota: "Es la falla MÁS COSTOSA por tiempo de parada. Prevención: verificar humedad y grasa de materia prima antes de producir"

  - id: "F010"
    nombre: "Desgaste excesivo de rodillos"
    sintomas:
      - "Producción de pellet disminuye gradualmente (ton/hora bajan sin cambio de fórmula)"
      - "Corriente del motor más baja de lo normal para la carga dada"
      - "Pellets salen con diámetro irregular o superficie rugosa"
      - "Se escucha golpeteo rítmico (rodillo desbalanceado)"
    causa_raiz: "Rodillos han excedido vida útil (>2000 horas) o materia prima abrasiva aceleró desgaste"
    verificacion: "Inspección visual por la puerta del dado. Rodillo desgastado muestra superficie lisa o irregular. Medir gap con galga: si >2mm, rodillo debe cambiarse"
    accion_operario: "Reducir alimentación 20% para compensar menor eficiencia. Reportar para programar cambio de rodillos"
    accion_mantenimiento: "Cambiar rodillos. Verificar eje y rodamientos al retirar. Registrar horas acumuladas del rodillo nuevo"
    tiempo_resolucion_tipico: "Cambio programado: 4-6 horas. Cambio de emergencia: 6-10 horas"

  - id: "F011"
    nombre: "Contaminación de materia prima"
    sintomas:
      - "Picos de corriente aleatorios y repetitivos"
      - "Ruidos metálicos esporádicos en la cámara de peletizado"
      - "Pellets con partículas metálicas o fragmentos extraños"
      - "Dado muestra marcas de impacto (dents) en la superficie interna"
    causa_raiz: "Partículas metálicas (tornillos, tuercas, fragmentos de criba) o piedras que pasaron el sistema de limpieza"
    verificacion: "Revisar trampa magnética antes del alimentador. Si el imán tiene partículas adheridas, la limpieza está fallando. Inspeccionar tolva de materia prima"
    accion_operario: "1. PARAR alimentación. 2. Limpiar trampa magnética. 3. Inspeccionar visualmente la tolva. 4. Reiniciar solo cuando el supervisor autorice"
    accion_mantenimiento: "Verificar cribas en molienda. Instalar o reemplazar detector de metales si no hay. Inspeccionar dado por daño permanente"
    tiempo_resolucion_tipico: "Limpieza de imán: 15 min. Inspección completa: 2 horas"
    nota: "Si no se detecta a tiempo, puede dañar dado y rodillos permanentemente — costo de reemplazo: USD 15,000-25,000"

  - id: "F012"
    nombre: "Humedad excesiva en producto final"
    sintomas:
      - "Humedad real > humedad objetivo + 1.5%"
      - "Pellets blandos al tacto, se deshacen fácilmente"
      - "Enfriador no logra bajar humedad al objetivo"
      - "Condensación visible en la descarga del enfriador"
    causa_raiz: "Exceso de vapor en acondicionador, materia prima con humedad alta (>14%), o enfriador con ventiladores deficientes"
    verificacion: "1. Verificar % de apertura de válvula Fisher (si >70%, hay exceso de vapor). 2. Medir humedad de materia prima con medidor rápido. 3. Verificar diferencial de temperatura en enfriador (debe ser >15°C entre entrada y salida)"
    accion_operario: "Reducir vapor (cerrar Fisher al 40%). Si persiste, reducir alimentación 15%. Verificar que ventiladores del enfriador estén operando a máxima velocidad"
    accion_mantenimiento: "Verificar correas de ventiladores. Limpiar filtros de aire del enfriador. Calibrar medidor de humedad en línea"
    tiempo_resolucion_tipico: "Ajuste de vapor: inmediato. Limpieza enfriador: 2 horas en parada programada"

  - id: "F013"
    nombre: "Fuga de vapor en acondicionador"
    sintomas:
      - "Vapor visible saliendo por sellos del acondicionador o conexiones"
      - "Presión de vapor cae lentamente pero la caldera está bien"
      - "Temperatura de acondicionamiento inferior a lo esperado"
      - "Ambiente húmedo y caliente alrededor del acondicionador"
    causa_raiz: "Empaquetaduras del acondicionador desgastadas, bridas flojas en conexiones de vapor, o sellos de eje dañados"
    verificacion: "Inspección visual directa. Usar detector de vapor portátil o simplemente observar si hay chorros de vapor en juntas y sellos"
    accion_operario: "No intentar ajustar bridas con el equipo en operación (riesgo de quemadura). Marcar punto de fuga con tiza. Compensar aumentando vapor si es fuga menor. Reportar a mantenimiento"
    accion_mantenimiento: "En próxima parada programada: cambiar empaquetaduras, reapretar bridas con torque especificado, reemplazar sellos de eje si aplica"
    tiempo_resolucion_tipico: "Solo en parada programada: 4-8 horas"
    nota: "RIESGO DE SEGURIDAD: vapor a 150°C puede causar quemaduras graves. NUNCA ajustar en caliente"

  - id: "F014"
    nombre: "Falla del variador de frecuencia (VFD)"
    sintomas:
      - "Motor no arranca o se detiene súbitamente"
      - "Display del variador muestra código de falla (OC=sobrecorriente, OV=sobrevoltaje, OH=sobretemperatura)"
      - "Corriente registrada en sistema cae a 0A abruptamente"
    causa_raiz: "Sobrecorriente por atoramiento, sobrecalentamiento del variador por ventilación deficiente, o falla de componentes internos (IGBT, capacitor DC bus)"
    verificacion: "Leer código de falla en display del variador ABB ACS880. Verificar temperatura del gabinete (debe ser <40°C). Si código es OC, verificar si dado estaba taponando"
    accion_operario: "1. NO intentar resetear más de 2 veces. 2. Si persiste tras 2 resets, llamar electricista. 3. Si huele a quemado, NO resetear — apagar breaker principal"
    accion_mantenimiento: "Descargar log de fallas del variador. Verificar ventiladores del gabinete. Medir resistencia de aislamiento del motor. Si IGBT dañado, requiere repuesto"
    tiempo_resolucion_tipico: "Reset simple: 5 min. Falla de ventilación: 1 hora. Falla de IGBT: 1-3 días (requiere repuesto)"

  - id: "F015"
    nombre: "Vibración excesiva en peletizadora"
    sintomas:
      - "Vibración perceptible al tacto en la estructura de la máquina"
      - "Ruido anormal: golpeteo, chirrido, o zumbido fuerte"
      - "Corriente del motor oscila sin cambio de alimentación"
      - "Tornillos de anclaje sueltos"
    causa_raiz: "Rodillos desbalanceados, rodamiento dañado, dado descentrado, base de la máquina desnivelada, o perno de anclaje roto"
    verificacion: "1. Verificar tornillos de anclaje (apretar si sueltos). 2. Con un estetoscopio industrial, escuchar rodamientos del motor y de los rodillos. 3. Medir vibración con vibrómetro portátil (>7mm/s = alarma)"
    accion_operario: "Si vibración es leve: reducir carga 20% y monitorear. Si vibración es severa: PARAR máquina inmediatamente y notificar supervisor"
    accion_mantenimiento: "Análisis de vibración con acelerómetro. Balanceo dinámico de rodillos. Verificar alineación motor-reductor. Cambiar rodamientos si están dañados"
    tiempo_resolucion_tipico: "Apriete de anclajes: 30 min. Cambio de rodamiento: 8-16 horas"

  - id: "F016"
    nombre: "Arranque fallido de peletizadora"
    sintomas:
      - "Motor no arranca (variador no energiza)"
      - "Motor arranca pero se dispara a los pocos segundos"
      - "Corriente de arranque supera el límite y variador corta"
    causa_raiz: "Dado frío con material viejo petrificado, breaker principal abierto, secuencia de arranque incorrecta, o protección térmica del motor activada"
    verificacion: "1. Verificar que breaker principal esté cerrado. 2. Verificar display del variador (debe estar en 'Ready'). 3. Si motor se dispara: verificar si hay material viejo en el dado (común después de parada de fin de semana)"
    accion_operario: "Si hay material viejo en dado: 1. Calentar acondicionador con vapor 10 minutos SIN motor. 2. Intentar arrancar en vacío. 3. Si no gira, NO forzar — llamar mantenimiento para limpieza mecánica"
    accion_mantenimiento: "Retirar material petrificado del dado con herramienta mecánica o aire comprimido caliente. Verificar rodamientos principales. Resetear protección térmica si se disparó"
    tiempo_resolucion_tipico: "Material petrificado: 1-4 horas. Falla eléctrica: variable"
    nota: "NUNCA forzar el motor contra un dado taponado — puede dañar el reductor (costo >USD 30,000)"

  - id: "F017"
    nombre: "Caída de rendimiento por cambio de fórmula"
    sintomas:
      - "Al cambiar de fórmula, la producción cae >30% respecto a la fórmula anterior"
      - "Corriente del motor cambia significativamente (sube o baja)"
      - "Temperatura óptima no se alcanza con los mismos parámetros de vapor"
    causa_raiz: "Cada fórmula tiene propiedades reológicas diferentes (contenido de fibra, grasa, almidón). Los parámetros de una fórmula NO aplican a otra"
    verificacion: "Verificar en el maestro de fórmulas los rangos de temperatura y presión para la nueva fórmula. Confirmar que el PLC cargó los setpoints correctos"
    accion_operario: "1. Reducir alimentación al 40% durante transición. 2. Ajustar vapor según nueva fórmula (ver ficha técnica). 3. Esperar estabilización 5-10 minutos. 4. Incrementar alimentación gradualmente"
    accion_mantenimiento: "Verificar que el cambio de receta en PLC se ejecutó correctamente. Revisar setpoints del lazo de control"
    tiempo_resolucion_tipico: "Transición normal: 15-20 minutos"

  - id: "F018"
    nombre: "Falla de instrumentación — sensor de presión Rosemount 3051"
    sintomas:
      - "Lectura de presión fija en un valor (no varía aunque se abra/cierre vapor)"
      - "Lectura muestra 0 PSI permanente o valor fuera de rango (>50 PSI)"
      - "Discrepancia entre lectura del sistema y manómetro local Bourdon"
    causa_raiz: "Transmisor Rosemount 3051 con diafragma dañado, tubería de impulso tapada, o falla electrónica del transmisor"
    verificacion: "Comparar lectura del sistema con manómetro Bourdon local (en la misma línea). Si Bourdon muestra valor correcto pero sistema no, el transmisor está fallando"
    accion_operario: "Operar guiándose por el manómetro local Bourdon hasta que instrumentista repare. Ajustar vapor manualmente. Reportar a mantenimiento"
    accion_mantenimiento: "1. Verificar tubería de impulso (purgar si tapada). 2. Verificar señal 4-20mA en bornes del transmisor. 3. Recalibrar con generador de presión portátil. 4. Reemplazar si no calibra"
    tiempo_resolucion_tipico: "Tubería tapada: 30 min. Recalibración: 1 hora. Reemplazo: 2-4 horas"

  - id: "F019"
    nombre: "Golpe de ariete (water hammer) en línea de vapor"
    sintomas:
      - "Ruidos fuertes tipo martilleo en la tubería de vapor"
      - "Vibración violenta de la tubería"
      - "Posible fuga de vapor en bridas o conexiones después del golpe"
    causa_raiz: "Condensado acumulado en la tubería de vapor que es empujado a alta velocidad por el vapor. Ocurre al abrir válvulas rápidamente o cuando trampas de vapor están fallando"
    verificacion: "Verificar si las trampas de vapor de la línea están descargando correctamente. Escuchar si el golpeteo se repite cada cierto tiempo"
    accion_operario: "1. CERRAR la válvula de vapor lentamente hasta que el golpeteo pare. 2. Esperar 5 minutos. 3. Reabrir MUY lentamente (1/4 de vuelta cada 30 segundos). 4. Si persiste, cerrar completamente y reportar"
    accion_mantenimiento: "Drenar condensado de la línea. Verificar todas las trampas de vapor en el trayecto. Verificar pendiente de la tubería (debe tener inclinación hacia trampas)"
    tiempo_resolucion_tipico: "Drenaje: 15-30 min. Reparación de trampas: 2 horas"
    nota: "PELIGRO: el golpe de ariete puede reventar tuberías o bridas. Si es violento, evacuar el área inmediatamente"

  - id: "F020"
    nombre: "Enfriador ineficiente — producto sale caliente"
    sintomas:
      - "Temperatura del pellet a la salida del enfriador >10°C por encima del ambiente"
      - "Pellets húmedos o con condensación superficial"
      - "Ventiladores del enfriador operando pero sin efecto suficiente"
    causa_raiz: "Filtros de aire del enfriador obstruidos, correas de ventiladores rotas o flojas, compuertas de aire cerradas, o exceso de producción para la capacidad del enfriador"
    verificacion: "1. Verificar diferencial de presión en los filtros (si >250 Pa, cambiar filtros). 2. Verificar correas de ventiladores (tensión, desgaste). 3. Medir temperatura a la salida"
    accion_operario: "Reducir alimentación 15% para dar más tiempo de enfriamiento por batch. Verificar que compuertas de aire estén completamente abiertas"
    accion_mantenimiento: "Limpiar o cambiar filtros. Tensar o reemplazar correas. Verificar motor de ventiladores. Limpiar ductos internos del enfriador"
    tiempo_resolucion_tipico: "Cambio de filtros: 30 min. Cambio de correas: 1 hora"

# ================================================================
# PROCEDIMIENTOS OPERATIVOS ESTÁNDAR (SOPs)
# ================================================================
procedimientos:

  arranque_maquina:
    nombre: "SOP-001: Arranque de peletizadora"
    pasos:
      - "1. Verificar que la caldera tenga presión >120 PSI en cabezal"
      - "2. Abrir válvula manual de aislamiento de vapor"
      - "3. Esperar 5 minutos para que el acondicionador se precaliente (temp >50°C)"
      - "4. Arrancar motor principal en vacío (verificar corriente <35A)"
      - "5. Iniciar alimentación al 30% de capacidad"
      - "6. Ajustar vapor hasta alcanzar temperatura objetivo de fórmula"
      - "7. Incrementar alimentación gradualmente (10% cada 3 minutos)"
      - "8. Verificar durabilidad y humedad del primer lote"

  parada_normal:
    nombre: "SOP-002: Parada normal de peletizadora"
    pasos:
      - "1. Reducir alimentación gradualmente (10% cada 2 minutos)"
      - "2. Cuando alimentación llegue a 0%, cerrar vapor (Fisher al 0%)"
      - "3. Dejar motor corriendo 5 minutos para limpiar dado"
      - "4. Apagar motor principal"
      - "5. Cerrar válvula manual de aislamiento de vapor"

  emergencia_sobrecarga:
    nombre: "SOP-003: Emergencia por sobrecarga de motor"
    pasos:
      - "1. PARAR alimentación inmediatamente (botón rojo del alimentador)"
      - "2. NO apagar el motor principal — dejarlo girar para evitar atoramiento"
      - "3. Cerrar vapor al 50%"
      - "4. Esperar a que corriente baje a <100A (vacío)"
      - "5. Si corriente NO baja en 3 minutos: PARAR motor (riesgo de atoramiento)"
      - "6. Notificar supervisor inmediatamente"
      - "7. NO reiniciar sin inspección de dado y rodillos"

  emergencia_presion_baja:
    nombre: "SOP-004: Emergencia por caída de presión de vapor"
    pasos:
      - "1. Verificar si afecta todas las máquinas o solo una"
      - "2. Si afecta TODAS: problema de caldera — reducir carga al 50% en todas las líneas"
      - "3. Si afecta UNA: problema local — verificar regulador y válvula de esa línea"
      - "4. Revisar manómetros locales (antes y después del regulador)"
      - "5. Si regulador falló: activar bypass manual si existe"
      - "6. Notificar a supervisor y mantenimiento"

  cambio_formula:
    nombre: "SOP-005: Cambio de fórmula en producción"
    pasos:
      - "1. Vaciar tolva de dosificación de la fórmula anterior (mínimo 95% vacía)"
      - "2. Reducir alimentación al 30% durante transición"
      - "3. Cargar nueva receta en PLC (verificar setpoints de temperatura y presión)"
      - "4. Ajustar ángulo de paletas del acondicionador según ficha de fórmula"
      - "5. Modificar vapor gradualmente hacia nuevo setpoint"
      - "6. Esperar estabilización térmica (5-10 minutos)"
      - "7. Incrementar alimentación al ritmo de producción objetivo"
      - "8. Verificar primera muestra: durabilidad y humedad deben estar en rango"
      - "9. Si calidad fuera de rango, ajustar antes de llegar a producción plena"

  cambio_dado:
    nombre: "SOP-006: Cambio de dado o rodillos"
    pasos:
      - "1. Parar alimentación y vaciar acondicionador"
      - "2. Apagar motor principal y bloquear (LOTO: Lock Out Tag Out)"
      - "3. Cerrar válvula manual de vapor y drenar acondicionador"
      - "4. Retirar guarda de seguridad y puerta de acceso al dado"
      - "5. Desmontar rodillos con herramienta hidráulica"
      - "6. Extraer dado con grúa puente o diferencial"
      - "7. Instalar dado nuevo (verificar alineación y torque de pernos)"
      - "8. Instalar rodillos nuevos (ajustar gap a 0.8-1.2mm con galga)"
      - "9. Girar a mano para verificar libertad de movimiento"
      - "10. Retirar LOTO, cerrar guardas, y arrancar según SOP-001"

  ronda_turno:
    nombre: "SOP-007: Ronda operativa de inicio de turno"
    pasos:
      - "1. Verificar presión de caldera en cabezal principal (>120 PSI)"
      - "2. Revisar manómetros locales de cada peletizadora"
      - "3. Verificar descarga de trampas de vapor (deben tener goteo visible)"
      - "4. Revisar nivel de aceite en reductores"
      - "5. Verificar trampa magnética del alimentador (limpiar si tiene partículas)"
      - "6. Revisar filtros del enfriador (diferencial <250 Pa)"
      - "7. Verificar tensión de correas de ventiladores"
      - "8. Confirmar que variadores no muestren códigos de falla"
      - "9. Registrar lecturas iniciales en bitácora de turno"
      - "10. Reportar novedades al supervisor entrante"

  emergencia_golpe_ariete:
    nombre: "SOP-008: Emergencia por golpe de ariete"
    pasos:
      - "1. CERRAR válvula de vapor inmediatamente (lento, no de golpe)"
      - "2. EVACUAR el área si el golpeteo es violento"
      - "3. Esperar 5 minutos con válvula cerrada"
      - "4. Abrir drenajes de línea para eliminar condensado"
      - "5. Verificar visualmente que no haya fugas en bridas o soldaduras"
      - "6. Reabrir vapor MUY lentamente (1/4 de vuelta cada 30 segundos)"
      - "7. Si se repite, cerrar y NO reabrir — llamar a mantenimiento"
      - "8. Documentar el incidente con hora, línea afectada y severidad"

# ================================================================
# HISTORIAL DE INCIDENTES RECIENTES (SINTÉTICO)
# ================================================================
historial_incidentes_referencia:
  - fecha: "2026-02-15"
    maquina: "301"
    falla: "F003"
    descripcion: "Temperatura no subía con presión normal. Trampa TD42 bloqueada"
    resolucion: "Operario purgó manualmente. Mantenimiento reemplazó internos de la trampa"
    tiempo_total: "35 minutos"
    leccion: "Implementar inspección semanal de trampas de vapor"

  - fecha: "2026-02-28"
    maquina: "301"
    falla: "F005"
    descripcion: "Corriente subió a 480A. Dado parcialmente taponado por materia prima húmeda"
    resolucion: "Operario redujo carga. Mantenimiento limpió dado con aire comprimido"
    tiempo_total: "3 horas"
    leccion: "Verificar humedad de materia prima antes de iniciar producción"

  - fecha: "2026-03-05"
    maquina: "302"
    falla: "F002"
    descripcion: "Presión baja solo en 302. Regulador Spirax descalibrado"
    resolucion: "Mantenimiento recalibró regulador. Setpoint estaba en 5 PSI en vez de 10 PSI"
    tiempo_total: "45 minutos"
    leccion: "Incluir verificación de setpoint de regulador en ronda de turno"

  - fecha: "2026-03-10"
    maquina: "301"
    falla: "F006"
    descripcion: "Presión oscilaba ±3 PSI. PID del lazo Fisher era demasiado agresivo"
    resolucion: "Operario pasó a modo manual. Instrumentista ajustó PID (Kp de 2.5 a 1.2)"
    tiempo_total: "1.5 horas"
    leccion: "Documentar parámetros PID después de cada ajuste"

  - fecha: "2026-03-18"
    maquina: "303"
    falla: "F001"
    descripcion: "Caída de presión en todas las máquinas. Quemador de caldera se apagó por falla de gas"
    resolucion: "Personal de caldera reinició quemador. Producción redujo carga 30 minutos"
    tiempo_total: "25 minutos"
    leccion: "Instalar alarma de presión de gas natural antes del quemador"

  - fecha: "2026-01-22"
    maquina: "301"
    falla: "F009"
    descripcion: "Atoramiento completo del dado. Materia prima con 16% de humedad (límite es 13%). Corriente llegó a 510A antes de que variador cortara"
    resolucion: "Mantenimiento extrajo dado y limpió con taladro. 4 agujeros dañados permanentemente. Producción perdida: 6 horas"
    tiempo_total: "6 horas"
    leccion: "Humedad de MP SIEMPRE debe medirse antes de producir. Control de calidad debe rechazar MP con >13.5%"

  - fecha: "2026-01-30"
    maquina: "302"
    falla: "F013"
    descripcion: "Fuga de vapor por sello del eje del acondicionador. Operario reportó ambiente húmedo"
    resolucion: "Se compensó con más vapor durante turno. En parada programada del sábado se cambiaron sellos"
    tiempo_total: "Compensación inmediata. Reparación definitiva: 6 horas en parada"
    leccion: "Incluir inspección visual de sellos en ronda de turno"

  - fecha: "2026-02-03"
    maquina: "301"
    falla: "F011"
    descripcion: "Picos de corriente aleatorios. Se encontraron 3 tornillos y una arandela en la trampa magnética. Un tornillo había pasado al dado"
    resolucion: "Parada de emergencia. Inspección de dado reveló marca de impacto pero sin perforación. Limpieza de trampa magnética"
    tiempo_total: "3 horas"
    leccion: "Trampa magnética debe limpiarse CADA turno, no cada día. Revisar cribas de molienda semanalmente"

  - fecha: "2026-02-10"
    maquina: "304"
    falla: "F014"
    descripcion: "Variador ABB mostró código OC (sobrecorriente) y cortó motor. Reset falló 2 veces"
    resolucion: "Electricista encontró ventilador del gabinete parado. Temperatura interna: 52°C (límite: 40°C). Se limpió filtro y cambió ventilador"
    tiempo_total: "2 horas"
    leccion: "Verificar temperatura de gabinetes eléctricos en ronda de turno"

  - fecha: "2026-02-18"
    maquina: "301"
    falla: "F012"
    descripcion: "Pellets salían con 14.8% humedad (objetivo 12.5%). Fisher estaba al 82% de apertura por error de setpoint en PLC"
    resolucion: "Operario redujo vapor manualmente. Instrumentista corrigió setpoint. 2 toneladas de producto fuera de especificación"
    tiempo_total: "45 minutos"
    leccion: "Después de cada cambio de fórmula, verificar que setpoints del PLC coincidan con ficha técnica"

  - fecha: "2026-02-22"
    maquina: "303"
    falla: "F010"
    descripcion: "Producción bajó de 8 a 5.5 ton/hora sin cambio de fórmula. Rodillos con >2800 horas"
    resolucion: "Cambio programado de rodillos el fin de semana. Producción volvió a 8.2 ton/hora"
    tiempo_total: "5 horas (cambio programado)"
    leccion: "Programar cambio de rodillos al llegar a 2000 horas, no esperar a que la producción caiga"

  - fecha: "2026-03-01"
    maquina: "302"
    falla: "F019"
    descripcion: "Golpe de ariete violento al abrir vapor después de parada de 4 horas. Operario abrió válvula demasiado rápido"
    resolucion: "Se cerró válvula, se drenó línea, se reabrió lentamente. Sin daño a tubería"
    tiempo_total: "20 minutos"
    leccion: "SIEMPRE abrir vapor lentamente después de parada prolongada. Drenar condensado primero"

  - fecha: "2026-03-08"
    maquina: "301"
    falla: "F015"
    descripcion: "Vibración excesiva detectada. Perno de anclaje frontal izquierdo roto"
    resolucion: "Parada de emergencia. Mantenimiento reemplazó perno y verificó los otros 7. Dos estaban flojos"
    tiempo_total: "2 horas"
    leccion: "Verificar torque de pernos de anclaje mensualmente"

  - fecha: "2026-03-12"
    maquina: "301"
    falla: "F016"
    descripcion: "Lunes 6am: motor no arrancó. Dado tenía material petrificado del viernes"
    resolucion: "Se calentó acondicionador con vapor 15 minutos. Material se ablandó parcialmente. Se arrancó en vacío y se purgó material viejo"
    tiempo_total: "45 minutos"
    leccion: "Antes de parar el viernes: purgar dado completamente pasando material seco (maíz) durante 5 minutos"

  - fecha: "2026-03-15"
    maquina: "302"
    falla: "F017"
    descripcion: "Cambio de fórmula XA1 a YB1. Producción cayó 40%. Operario no ajustó ángulo de paletas ni vapor"
    resolucion: "Supervisor indicó ajustar paletas de 20° a 30° y subir vapor 15%. Producción se normalizó"
    tiempo_total: "25 minutos"
    leccion: "La ficha técnica de cada fórmula DEBE consultarse antes del cambio. No asumir mismos parámetros"

  - fecha: "2026-03-20"
    maquina: "301"
    falla: "F018"
    descripcion: "Sensor Rosemount 3051 mostraba 0 PSI constante. Manómetro Bourdon indicaba 9.5 PSI (correcto)"
    resolucion: "Instrumentista encontró tubería de impulso tapada con óxido. Se purgó y recalibró transmisor"
    tiempo_total: "1.5 horas"
    leccion: "Purgar tuberías de impulso de transmisores cada 3 meses"

  - fecha: "2026-03-22"
    maquina: "301"
    falla: "F020"
    descripcion: "Pellets salían a 42°C (ambiente 28°C). Diferencial insuficiente. Filtros del enfriador obstruidos"
    resolucion: "Operario redujo alimentación 15%. En parada de almuerzo se cambiaron filtros"
    tiempo_total: "Compensación inmediata. Cambio de filtros: 30 min en parada"
    leccion: "Revisar diferencial de presión de filtros del enfriador diariamente"
